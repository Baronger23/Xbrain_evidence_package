AWSTemplateFormatVersion: "2010-09-09"
Description: Full W3 CloudFormation coverage for the SportFields truc stack.

Parameters:
  ProjectName:
    Type: String
    Default: sportfields
  EnvironmentName:
    Type: String
    Default: dev
  ResourceSuffix:
    Type: String
    Default: truc-cfn
    Description: Use a separate suffix when deploying this bonus stack.
  VpcCidr:
    Type: String
    Default: 10.40.0.0/16
  PublicSubnet1Cidr:
    Type: String
    Default: 10.40.0.0/24
  PublicSubnet2Cidr:
    Type: String
    Default: 10.40.1.0/24
  PrivateAppSubnet1Cidr:
    Type: String
    Default: 10.40.10.0/24
  PrivateAppSubnet2Cidr:
    Type: String
    Default: 10.40.11.0/24
  PrivateDataSubnet1Cidr:
    Type: String
    Default: 10.40.20.0/24
  PrivateDataSubnet2Cidr:
    Type: String
    Default: 10.40.21.0/24
  AvailabilityZone1:
    Type: AWS::EC2::AvailabilityZone::Name
    Default: us-west-2a
  AvailabilityZone2:
    Type: AWS::EC2::AvailabilityZone::Name
    Default: us-west-2b
  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
  BackendInstanceType:
    Type: String
    Default: t3.micro
  BackendArtifactBucket:
    Type: String
    Description: Existing S3 bucket that stores backend artifact releases.
  BackendArtifactKey:
    Type: String
    Default: backend/releases/latest.tar.gz
  BackendEnvSsmParameter:
    Type: String
    Description: SSM SecureString parameter name containing backend .env content.
  BackendAcmCertificateArn:
    Type: String
    Description: ACM certificate ARN in this region for the API origin hostname.
  DbName:
    Type: String
    Default: sportfields
  DbUsername:
    Type: String
    Default: sportfields_pro
  DbPassword:
    Type: String
    NoEcho: true
    MinLength: 8
  DbInstanceClass:
    Type: String
    Default: db.t3.micro
  DbAllocatedStorage:
    Type: Number
    Default: 100
  RedisNodeType:
    Type: String
    Default: cache.t4g.micro
  BedrockGenerationModelId:
    Type: String
    Default: arn:aws:bedrock:us-west-2:645314756823:inference-profile/us.anthropic.claude-3-haiku-20240307-v1:0
  BedrockEmbeddingModelArn:
    Type: String
    Default: arn:aws:bedrock:us-west-2::foundation-model/amazon.titan-embed-text-v2:0

Mappings:
  PrefixLists:
    us-west-2:
      CloudFrontOriginFacing: pl-82a045eb

Resources:
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${EnvironmentName}-vpc-${ResourceSuffix}
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref EnvironmentName

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${EnvironmentName}-igw-${ResourceSuffix}

  VpcGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref InternetGateway
      VpcId: !Ref Vpc

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      AvailabilityZone: !Ref AvailabilityZone1
      CidrBlock: !Ref PublicSubnet1Cidr
      MapPublicIpOnLaunch: true
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${EnvironmentName}-public-1-${ResourceSuffix}

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      AvailabilityZone: !Ref AvailabilityZone2
      CidrBlock: !Ref PublicSubnet2Cidr
      MapPublicIpOnLaunch: true
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${EnvironmentName}-public-2-${ResourceSuffix}

  PrivateAppSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      AvailabilityZone: !Ref AvailabilityZone1
      CidrBlock: !Ref PrivateAppSubnet1Cidr
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${EnvironmentName}-private-app-1-${ResourceSuffix}

  PrivateAppSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      AvailabilityZone: !Ref AvailabilityZone2
      CidrBlock: !Ref PrivateAppSubnet2Cidr
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${EnvironmentName}-private-app-2-${ResourceSuffix}

  PrivateDataSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      AvailabilityZone: !Ref AvailabilityZone1
      CidrBlock: !Ref PrivateDataSubnet1Cidr
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${EnvironmentName}-private-data-1-${ResourceSuffix}

  PrivateDataSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      AvailabilityZone: !Ref AvailabilityZone2
      CidrBlock: !Ref PrivateDataSubnet2Cidr
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${EnvironmentName}-private-data-2-${ResourceSuffix}

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${EnvironmentName}-public-rt-${ResourceSuffix}

  PublicDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: VpcGatewayAttachment
    Properties:
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet1

  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet2

  NatEip:
    Type: AWS::EC2::EIP
    DependsOn: VpcGatewayAttachment
    Properties:
      Domain: vpc

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEip.AllocationId
      SubnetId: !Ref PublicSubnet1
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${EnvironmentName}-nat-${ResourceSuffix}

  PrivateAppRouteTable1:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${EnvironmentName}-private-app-rt-1-${ResourceSuffix}

  PrivateAppRouteTable2:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${EnvironmentName}-private-app-rt-2-${ResourceSuffix}

  PrivateAppDefaultRoute1:
    Type: AWS::EC2::Route
    Properties:
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway
      RouteTableId: !Ref PrivateAppRouteTable1

  PrivateAppDefaultRoute2:
    Type: AWS::EC2::Route
    Properties:
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway
      RouteTableId: !Ref PrivateAppRouteTable2

  PrivateAppSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateAppRouteTable1
      SubnetId: !Ref PrivateAppSubnet1

  PrivateAppSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateAppRouteTable2
      SubnetId: !Ref PrivateAppSubnet2

  PrivateDataRouteTable1:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${EnvironmentName}-private-data-rt-1-${ResourceSuffix}

  PrivateDataRouteTable2:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${EnvironmentName}-private-data-rt-2-${ResourceSuffix}

  PrivateDataSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateDataRouteTable1
      SubnetId: !Ref PrivateDataSubnet1

  PrivateDataSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateDataRouteTable2
      SubnetId: !Ref PrivateDataSubnet2

  S3GatewayEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      RouteTableIds:
        - !Ref PrivateAppRouteTable1
        - !Ref PrivateAppRouteTable2
        - !Ref PrivateDataRouteTable1
        - !Ref PrivateDataRouteTable2
      ServiceName: !Sub com.amazonaws.${AWS::Region}.s3
      VpcEndpointType: Gateway
      VpcId: !Ref Vpc

  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ALB only accepts CloudFront origin-facing traffic.
      GroupName: !Sub ${ProjectName}-${EnvironmentName}-alb-sg-${ResourceSuffix}
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          SourcePrefixListId: !FindInMap [PrefixLists, !Ref AWS::Region, CloudFrontOriginFacing]
      VpcId: !Ref Vpc

  Ec2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Backend EC2 app port from ALB only.
      GroupName: !Sub ${ProjectName}-${EnvironmentName}-ec2-sg-${ResourceSuffix}
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5001
          ToPort: 5001
          SourceSecurityGroupId: !Ref AlbSecurityGroup
      VpcId: !Ref Vpc

  RdsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: PostgreSQL from app tier only.
      GroupName: !Sub ${ProjectName}-${EnvironmentName}-rds-sg-${ResourceSuffix}
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref Ec2SecurityGroup
      VpcId: !Ref Vpc

  RedisSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Redis from app tier only.
      GroupName: !Sub ${ProjectName}-${EnvironmentName}-redis-sg-${ResourceSuffix}
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 6379
          ToPort: 6379
          SourceSecurityGroupId: !Ref Ec2SecurityGroup
      VpcId: !Ref Vpc

  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${ProjectName}-${EnvironmentName}-frontend-${ResourceSuffix}
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  UserAssetBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${ProjectName}-${EnvironmentName}-user-assets-${ResourceSuffix}
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  BackupBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${ProjectName}-${EnvironmentName}-backup-${ResourceSuffix}
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  AuditBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${ProjectName}-${EnvironmentName}-audit-${ResourceSuffix}
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  DbSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: SportFields private data subnets.
      SubnetIds:
        - !Ref PrivateDataSubnet1
        - !Ref PrivateDataSubnet2

  DbInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      AllocatedStorage: !Ref DbAllocatedStorage
      BackupRetentionPeriod: 7
      DBInstanceClass: !Ref DbInstanceClass
      DBInstanceIdentifier: !Sub ${ProjectName}-${EnvironmentName}-postgres-${ResourceSuffix}
      DBName: !Ref DbName
      DBSubnetGroupName: !Ref DbSubnetGroup
      Engine: postgres
      MasterUsername: !Ref DbUsername
      MasterUserPassword: !Ref DbPassword
      MultiAZ: true
      PubliclyAccessible: false
      StorageEncrypted: true
      StorageType: gp3
      VPCSecurityGroups:
        - !Ref RdsSecurityGroup

  RedisSubnetGroup:
    Type: AWS::ElastiCache::SubnetGroup
    Properties:
      Description: SportFields Redis private data subnets.
      SubnetIds:
        - !Ref PrivateDataSubnet1
        - !Ref PrivateDataSubnet2

  RedisReplicationGroup:
    Type: AWS::ElastiCache::ReplicationGroup
    Properties:
      AutomaticFailoverEnabled: true
      CacheNodeType: !Ref RedisNodeType
      CacheSubnetGroupName: !Ref RedisSubnetGroup
      Engine: redis
      EngineVersion: "7.1"
      MultiAZEnabled: true
      NumCacheClusters: 2
      ReplicationGroupDescription: SportFields Redis replication group.
      ReplicationGroupId: !Sub ${ProjectName}-${EnvironmentName}-redis-${ResourceSuffix}
      SecurityGroupIds:
        - !Ref RedisSecurityGroup

  BackendRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-${EnvironmentName}-ec2-role-${ResourceSuffix}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: backend-runtime
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource: !Sub arn:aws:s3:::${BackendArtifactBucket}/${BackendArtifactKey}
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                Resource: !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${BackendEnvSsmParameter}
              - Effect: Allow
                Action:
                  - bedrock:Retrieve
                  - bedrock:RetrieveAndGenerate
                  - bedrock:InvokeModel
                  - bedrock:GetInferenceProfile
                Resource: "*"

  BackendInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub ${ProjectName}-${EnvironmentName}-ec2-profile-${ResourceSuffix}
      Roles:
        - !Ref BackendRole

  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub ${ProjectName}-${EnvironmentName}-alb-${ResourceSuffix}
      Scheme: internet-facing
      SecurityGroups:
        - !Ref AlbSecurityGroup
      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      Type: application

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      HealthCheckPath: /health
      HealthCheckPort: "5001"
      HealthCheckProtocol: HTTP
      Matcher:
        HttpCode: "200"
      Port: 5001
      Protocol: HTTP
      TargetType: instance
      VpcId: !Ref Vpc

  HttpsListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      Certificates:
        - CertificateArn: !Ref BackendAcmCertificateArn
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 443
      Protocol: HTTPS

  BackendLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub ${ProjectName}-${EnvironmentName}-lt-${ResourceSuffix}
      LaunchTemplateData:
        IamInstanceProfile:
          Arn: !GetAtt BackendInstanceProfile.Arn
        ImageId: !Ref LatestAmiId
        InstanceType: !Ref BackendInstanceType
        SecurityGroupIds:
          - !Ref Ec2SecurityGroup
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            set -euo pipefail
            dnf install -y tar gzip awscli
            mkdir -p /opt/sportfields
            aws s3 cp s3://${BackendArtifactBucket}/${BackendArtifactKey} /opt/sportfields/backend.tar.gz --region ${AWS::Region}
            tar -xzf /opt/sportfields/backend.tar.gz -C /opt/sportfields
            aws ssm get-parameter --name "${BackendEnvSsmParameter}" --with-decryption --region ${AWS::Region} --query Parameter.Value --output text > /opt/sportfields/.env

  BackendAutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      AutoScalingGroupName: !Sub ${ProjectName}-${EnvironmentName}-asg-${ResourceSuffix}
      DesiredCapacity: "2"
      HealthCheckGracePeriod: 180
      HealthCheckType: ELB
      LaunchTemplate:
        LaunchTemplateId: !Ref BackendLaunchTemplate
        Version: !GetAtt BackendLaunchTemplate.LatestVersionNumber
      MaxSize: "4"
      MinSize: "2"
      TargetGroupARNs:
        - !Ref TargetGroup
      VPCZoneIdentifier:
        - !Ref PrivateAppSubnet1
        - !Ref PrivateAppSubnet2

  KbSyncRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-${EnvironmentName}-kb-sync-role-${ResourceSuffix}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: kb-sync
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${ProjectName}-${EnvironmentName}-kb-sync-${ResourceSuffix}:*
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt BackupBucket.Arn
                  - !Sub ${BackupBucket.Arn}/w3-documents/*
              - Effect: Allow
                Action:
                  - bedrock:StartIngestionJob
                  - bedrock:GetIngestionJob
                  - bedrock:GetKnowledgeBase
                  - bedrock:GetDataSource
                Resource:
                  - !Sub arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:knowledge-base/*

  KbSyncFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${ProjectName}-${EnvironmentName}-kb-sync-${ResourceSuffix}
      Handler: index.handler
      MemorySize: 256
      Role: !GetAtt KbSyncRole.Arn
      Runtime: nodejs20.x
      Timeout: 60
      Environment:
        Variables:
          DOCS_BUCKET_NAME: !Ref BackupBucket
          DOCS_EVENT_PREFIX: w3-documents/
          BEDROCK_REGION: !Ref AWS::Region
          BEDROCK_KB_ID: !Ref BedrockKnowledgeBase
          BEDROCK_KB_DATA_SOURCE_ID: !GetAtt BedrockDataSource.DataSourceId
      Code:
        ZipFile: |
          const { BedrockAgentClient, StartIngestionJobCommand } = require("@aws-sdk/client-bedrock-agent");
          const client = new BedrockAgentClient({ region: process.env.BEDROCK_REGION });
          exports.handler = async (event) => {
            const records = (event.Records || []).map((record) => ({
              eventName: record.eventName,
              bucket: record.s3.bucket.name,
              key: decodeURIComponent(record.s3.object.key.replace(/\+/g, " "))
            })).filter((record) => record.key.startsWith(process.env.DOCS_EVENT_PREFIX));
            if (records.length === 0) {
              console.log(JSON.stringify({ message: "No matching docs records", recordCount: 0 }));
              return { skipped: true };
            }
            const response = await client.send(new StartIngestionJobCommand({
              knowledgeBaseId: process.env.BEDROCK_KB_ID,
              dataSourceId: process.env.BEDROCK_KB_DATA_SOURCE_ID,
              description: `Triggered by S3 event for ${records[0].key}`
            }));
            console.log(JSON.stringify({
              message: "SportFields KB sync ingestion started",
              knowledgeBaseId: process.env.BEDROCK_KB_ID,
              dataSourceId: process.env.BEDROCK_KB_DATA_SOURCE_ID,
              ingestionJobId: response.ingestionJob?.ingestionJobId,
              records
            }));
            return response;
          };

  KbSyncInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref KbSyncFunction
      Principal: s3.amazonaws.com
      SourceAccount: !Ref AWS::AccountId
      SourceArn: !GetAtt BackupBucket.Arn

  BedrockKbRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-${EnvironmentName}-bedrock-kb-role-${ResourceSuffix}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: bedrock-kb
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt BackupBucket.Arn
                  - !Sub ${BackupBucket.Arn}/w3-documents/*
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource: !Ref BedrockEmbeddingModelArn
              - Effect: Allow
                Action:
                  - s3vectors:QueryVectors
                  - s3vectors:PutVectors
                  - s3vectors:GetVectors
                  - s3vectors:DeleteVectors
                  - s3vectors:ListVectors
                Resource: !GetAtt VectorIndex.Arn

  VectorBucket:
    Type: AWS::S3Vectors::VectorBucket
    Properties:
      VectorBucketName: !Sub ${ProjectName}-${EnvironmentName}-vectors-${ResourceSuffix}

  VectorIndex:
    Type: AWS::S3Vectors::Index
    Properties:
      DataType: float32
      Dimension: 1024
      DistanceMetric: cosine
      IndexName: !Sub ${ProjectName}-${EnvironmentName}-kb-index-${ResourceSuffix}
      MetadataConfiguration:
        NonFilterableMetadataKeys:
          - AMAZON_BEDROCK_TEXT_CHUNK
          - AMAZON_BEDROCK_METADATA
      VectorBucketName: !Ref VectorBucket

  BedrockKnowledgeBase:
    Type: AWS::Bedrock::KnowledgeBase
    Properties:
      Name: !Sub ${ProjectName}-${EnvironmentName}-kb-${ResourceSuffix}
      RoleArn: !GetAtt BedrockKbRole.Arn
      KnowledgeBaseConfiguration:
        Type: VECTOR
        VectorKnowledgeBaseConfiguration:
          EmbeddingModelArn: !Ref BedrockEmbeddingModelArn
          EmbeddingModelConfiguration:
            BedrockEmbeddingModelConfiguration:
              Dimensions: 1024
      StorageConfiguration:
        Type: S3_VECTORS
        S3VectorsConfiguration:
          IndexArn: !GetAtt VectorIndex.Arn

  BedrockDataSource:
    Type: AWS::Bedrock::DataSource
    Properties:
      Name: !Sub ${ProjectName}-${EnvironmentName}-docs-${ResourceSuffix}
      KnowledgeBaseId: !Ref BedrockKnowledgeBase
      DataSourceConfiguration:
        Type: S3
        S3Configuration:
          BucketArn: !GetAtt BackupBucket.Arn
          InclusionPrefixes:
            - w3-documents/

Outputs:
  VpcId:
    Value: !Ref Vpc
  AppSubnets:
    Value: !Join [",", [!Ref PrivateAppSubnet1, !Ref PrivateAppSubnet2]]
  DataSubnets:
    Value: !Join [",", [!Ref PrivateDataSubnet1, !Ref PrivateDataSubnet2]]
  DbEndpoint:
    Value: !GetAtt DbInstance.Endpoint.Address
  RedisEndpoint:
    Value: !GetAtt RedisReplicationGroup.PrimaryEndPoint.Address
  AlbDnsName:
    Value: !GetAtt ApplicationLoadBalancer.DNSName
  DocsBucket:
    Value: !Ref BackupBucket
  KnowledgeBaseId:
    Value: !Ref BedrockKnowledgeBase
  DataSourceId:
    Value: !GetAtt BedrockDataSource.DataSourceId
  VectorStore:
    Value: S3 Vectors
